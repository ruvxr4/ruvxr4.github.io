<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday P'Mudmee 🎂</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Titan+One&family=Sriracha&family=Prompt:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { padding: 0; margin: 0; box-sizing: border-box; }

    :root {
      --pink:       #FF7882;
      --pink-light: #feecea;
      --pink-pale:  #fff0f5;
      --pink-deep:  #c2185b;
      --pink-mid:   #e91e8c;
      --black:      #333;
      --white:      #fff;
      --bg-letter:  #fff8e4;
      --border:     #DACCBF;
    }

    html, body { height: 100%; }

    body {
      font-size: 16px;
      background: linear-gradient(135deg, var(--pink-pale) 0%, var(--pink-light) 60%, var(--pink-pale) 100%);
      font-family: 'Prompt', sans-serif;
      overflow-x: hidden;
    }

    /* ── GRID BG ── */
    #wrapper {
      position: relative;
      height: 100%;
      min-height: 100vh;
      overflow: hidden;
      background-image:
        linear-gradient(0deg,  transparent 24%, rgba(255,255,255,.9) 25%, rgba(255,255,255,.9) 26%, transparent 27%, transparent 74%, rgba(255,255,255,.9) 75%, rgba(255,255,255,.9) 76%, transparent 77%),
        linear-gradient(90deg, transparent 24%, rgba(255,255,255,.9) 25%, rgba(255,255,255,.9) 26%, transparent 27%, transparent 74%, rgba(255,255,255,.9) 75%, rgba(255,255,255,.9) 76%, transparent 77%);
      background-size: 80px 80px;
    }

    /* ── FLAG ── */
    .flag__birthday {
      display: flex;
      justify-content: space-between;
      transform: translateY(-220px);
      animation: flagDown 1.5s 2s forwards ease-out;
    }
    @keyframes flagDown { to { transform: translateY(-10px); } }
    .flag__birthday .flag__left  { transform: rotate(-10deg) translate(-20px, 30px); }
    .flag__birthday .flag__right { transform: rotate(10deg) translate(20px, 30px) scaleX(-1); }
    .flag__birthday img { width: clamp(180px, 28vw, 350px); }

    /* ── CONTENT LAYOUT ── */
    .content {
      display: flex;
      width: 100%;
      padding-top: 2rem;
    }
    .content .left  { position: relative; width: 40%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .content .right { position: relative; width: 60%; display: flex; flex-direction: column; justify-content: center; align-items: center; }

    /* ── TITLE ── */
    .title {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      font-family: 'Titan One', sans-serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      perspective: 1000px;
    }
    .title .happy, .title .birthday {
      display: flex;
      justify-content: center;
      font-weight: bold;
      text-shadow: 3px 3px var(--black), -3px 3px var(--black), 3px -3px var(--black), -3px -3px var(--black), 3px 6px 0 var(--black);
    }
    .title .happy   { color: var(--white); }
    .title .birthday { color: var(--pink); }

    .title .happy span, .title .birthday span {
      transform: translateY(50px);
      opacity: 0;
      visibility: hidden;
      animation: spanUp .5s var(--t) forwards;
    }
    @keyframes spanUp { 100% { transform: translateY(0); opacity: 1; visibility: visible; } }

    /* ── HAT ── */
    .title .hat {
      position: absolute;
      right: 30px;
      top: -320px;
      transform: rotate(-40deg);
      z-index: -1;
      animation: hatFall 4s 7s forwards ease;
    }
    .title .hat img { width: clamp(80px, 10vw, 130px); }
    @keyframes hatFall {
      20%, 30% { top: -28px; transform: rotate(-40deg); }
      35%, 100% { top: -28px; transform: rotate(0deg); }
    }

    /* ── DATE OF BIRTH ── */
    .date__of__birth, .name {
      display: flex;
      justify-content: space-around;
      align-items: center;
      background-color: var(--pink);
      border-radius: 50px;
      margin-top: 20px;
      font-family: 'Sriracha', cursive;
    }
    .date__of__birth {
      border: 3px solid var(--black);
      position: relative;
      transform: translateY(-100px);
      z-index: -1;
      opacity: 0;
      visibility: hidden;
      width: 0;
      animation: dateAppear 5s 9s forwards;
    }
    @keyframes dateAppear {
      20%,40% { width:0; height:0; transform:translateY(0); opacity:1; visibility:visible; }
      45%     { transform:translateY(0); opacity:1; visibility:visible; width:260px; height:0; }
      50%,100%{ transform:translateY(0); opacity:1; visibility:visible; width:260px; height:46px; }
    }
    .date__of__birth span { font-weight: bold; margin: 0 30px; font-size: 1.1rem; }

    /* ── BUTTON ── */
    .left .btn {
      transform: scale(0);
      animation: popScale 2s 16s forwards ease-in-out;
    }
    #btn__letter {
      margin-top: 28px;
      background: var(--pink);
      outline: none;
      padding: 8px 20px;
      font-size: 1rem;
      border-radius: 50px;
      border: 3px solid var(--black);
      font-family: 'Sriracha', cursive;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: all .4s;
    }
    #btn__letter:hover { background: var(--pink-mid); color: #fff; box-shadow: 0 4px 16px rgba(233,30,140,.4); border-color: var(--pink-mid); }
    #btn__letter:active { transform: scale(0.9); }
    #btn__letter:hover i { animation: wiggle 1s infinite linear; }
    @keyframes wiggle { 25% { transform: rotate(12deg); } 75% { transform: rotate(-12deg); } }

    /* ── PROFILE CIRCLE ── */
    .box__account {
      position: relative;
      transform: translateY(600px);
      animation: slideUp 8s 7s forwards ease-in;
    }
    @keyframes slideUp { to { transform: translateY(0); } }

    .image {
      width: clamp(220px, 30vw, 400px);
      height: clamp(220px, 30vw, 400px);
      border-radius: 50%;
      overflow: hidden;
      border: 6px solid var(--black);
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--pink-light);
    }
    .image img { width: 100%; height: 100%; object-fit: cover; }
    .image .placeholder-icon { font-size: clamp(60px, 10vw, 100px); color: var(--pink); }

    .name {
      position: absolute;
      padding: 0 20px;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      border: 3px solid var(--black);
      white-space: nowrap;
      font-family: 'Dancing Script', cursive;
    }
    .name span { font-weight: bold; margin: 0 24px; font-size: clamp(1.2rem, 2vw, 1.7rem); }
    .name .fa-heart { color: var(--pink); filter: drop-shadow(0 0 3px var(--pink)); animation: heartPulse 1s infinite linear; }
    @keyframes heartPulse { 50% { transform: scale(1.25); } }

    /* ── BALLOONS ── */
    .balloon_one { position: absolute; top: -70px; left: -70px; animation: bln1 2s infinite linear; }
    .balloon_two { position: absolute; top: 160px; right: -65px; z-index: -1; transform: rotate(10deg); animation: bln2 2s infinite linear; }
    .balloon_one img, .balloon_two img { width: clamp(60px, 8vw, 100px); }
    @keyframes bln1 { 25% { transform: rotate(3deg); } 75% { transform: rotate(-3deg); } }
    @keyframes bln2 { 25% { transform: rotate(7deg); } 75% { transform: rotate(13deg); } }

    /* ── CIRCLE SPINNER ── */
    .cricle {
      position: absolute;
      top: 20px; right: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      transform: scale(0);
      animation: popScale 3s 15s forwards ease-in-out;
    }
    @keyframes popScale {
      0%   { transform: scale(0); }
      10%  { transform: scale(1.3); }
      20%  { transform: scale(0.7); }
      30%, 100% { transform: scale(1); }
    }
    .text__cricle {
      width: 100px; height: 100px;
      background: var(--pink);
      border-radius: 50%;
      border: 5px solid var(--black);
      display: flex;
      justify-content: center;
      align-items: center;
      animation: spin 5s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .text__cricle span {
      position: absolute;
      top: 0; left: 50%;
      font-size: .65rem;
      font-family: 'Sriracha', cursive;
      text-transform: uppercase;
      color: var(--black);
      transform: rotate(calc(var(--i) * 24deg));
      transform-origin: 0 45px;
    }
    .cricle .fa-heart { position: absolute; color: var(--pink); filter: drop-shadow(0 0 3px var(--pink)); animation: heartPulse 1s infinite; }

    /* ── DECORATIONS ── */
    .decorate_star {
      position: absolute;
      transform: scale(0);
      background: var(--black);
      clip-path: polygon(0 50%,35% 35%,50% 0,65% 35%,100% 50%,65% 65%,50% 100%,35% 65%);
      animation: popScale 3s var(--t) forwards, starPulse 2s 16s infinite ease-in-out;
    }
    @keyframes starPulse { 25% { transform: scale(.8); } 50% { transform: scale(1.1); } }
    .star1 { width:20px; height:20px; top:75px;  left:300px; }
    .star2 { width:15px; height:20px; top:35px;  right:360px; }
    .star3 { width:14px; height:14px; top:290px; left:630px; }
    .star4 { width:18px; height:18px; bottom:60px; left:35px; }
    .star5 { width:16px; height:18px; bottom:140px; left:500px; }

    .decorate_flower {
      position: absolute;
      transform: scale(0);
      animation: popScale 3s var(--t) forwards ease-in-out;
    }
    .decorate_flower img { width: 20px; }
    .flower1 { top:250px; left:50px; }
    .flower2 { top:225px; left:540px; }
    .flower3 { top:150px; right:235px; }

    .decorate_bottom { position: absolute; right:0; bottom:-10px; }
    .decorate_bottom img { width: 100px; }

    .smiley__icon {
      position: absolute;
      bottom:180px; left:600px;
      transform: scale(0);
      animation: popScale 3s 15s forwards ease-in-out;
    }
    .smiley__icon img { width: 100px; }

    /* ── PARTICLES ── */
    .particle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      animation: floatUp linear infinite;
      z-index: 0;
    }
    @keyframes floatUp { 0% { transform: translateY(0) rotate(0deg); opacity:.8; } 100% { transform: translateY(-110vh) rotate(720deg); opacity:0; } }

    /* ── MAIL POPUP ── */
    .boxMail {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.8);
      opacity: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      transform: scale(.3);
      visibility: hidden;
      transition: all .5s;
      z-index: 9999;
    }
    .boxMail.active { opacity:1; visibility:visible; transform:scale(1); }

    .boxMail .fa-xmark {
      position: fixed;
      top: 0; right: 0;
      font-size: 30px;
      padding: 10px 25px;
      cursor: pointer;
      color: #fff;
      z-index: 10000;
    }

    .boxMail-container {
      position: relative;
      width: min(750px, 92vw);
      height: min(500px, 80vh);
      display: flex;
      transform: scale(.9);
      perspective: 2000px;
      transition: all .5s;
    }
    .boxMail-container:hover { transform: rotate(-5deg); filter: drop-shadow(0 0 12px var(--pink)); }
    .boxMail-container:hover .card1 { transform: translate(-187px,-250px) rotateY(-140deg); }

    .card1, .card2 {
      position: absolute;
      width: 50%;
      height: 100%;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      border: 1px solid var(--black);
    }
    .card1 {
      background: linear-gradient(to right, var(--pink), var(--pink) 63%);
      color: var(--white);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 1;
      transform-style: preserve-3d;
      transform-origin: left;
      transition: all 1s ease-in-out;
    }
    .card1 .userImg {
      width: 80px; height: 80px;
      background: #fff;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid #fff;
      margin-bottom: 16px;
    }
    .card1 .userImg img { width: 100%; height: 100%; object-fit: cover; }
    .card1 .userImg .ph-icon { font-size: 50px; color: var(--pink); display: flex; align-items: center; justify-content: center; height: 100%; }

    .card1 h4.username {
      font-family: 'Dancing Script', cursive;
      font-size: 1.1rem;
      margin-bottom: 8px;
      text-align: center;
    }
    .card1 h3 {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(24px, 4vw, 38px);
      text-transform: uppercase;
      width: 80%;
      text-align: center;
      line-height: 1.5;
      letter-spacing: 4px;
      transform: rotate(-5deg);
      text-shadow: 0 0 5px rgba(255,255,255,.6), 0 0 12px rgba(255,255,255,.4);
    }

    .card2 {
      background: linear-gradient(to right, #e0e0e0, #fff 30%);
      transform-style: preserve-3d;
      transform-origin: left;
      transition: all 1s;
    }
    .card2-content {
      width: 100%; height: 100%;
      background: var(--pink);
      transition: all 1s;
      overflow: hidden;
      color: #fff;
    }
    .boxMail-container:hover .card2-content { transform: translate(20px,20px); box-shadow: -1px -1px 5px rgba(0,0,0,.4); }

    .card2 h3 {
      font-family: 'Dancing Script', cursive;
      padding: 20px 0 10px 60px;
      opacity: 0; visibility: hidden;
      font-size: 1.4rem;
      text-shadow: 0 0 8px var(--pink);
    }
    .card2:hover h3 { animation: slideH3 3s 2s forwards; }
    @keyframes slideH3 { 0% { opacity:1; visibility:visible; padding-left:60px; } 100% { opacity:1; visibility:visible; padding-left:152px; } }

    .card2 h2 {
      font-family: 'Dancing Script', cursive;
      padding: 0 20px;
      text-indent: 20px;
      font-size: clamp(14px, 1.8vw, 20px);
      line-height: 1.7;
      opacity: 0;
    }
    .card2:hover h2 { animation: fadeIn2 2s 4s forwards; }
    @keyframes fadeIn2 { to { opacity: 1; } }

    /* ── RESPONSIVE ── */
    @media (max-width: 680px) {
      .content { flex-direction: column; align-items: center; gap: 28px; padding-top: 1.5rem; }
      .content .left, .content .right { width: 100%; }
      .title { font-size: 1.6rem; letter-spacing: 6px; }
      .cricle { top: 8px; right: -50px; }
      .title .hat { right: -90px; top: -50px !important; }
      .image { width: 200px; height: 200px; }
      .name span { font-size: 1rem; }
      .balloon_one { top: 8px; left: -70px; }
      .balloon_one img { width: 70px !important; }
      .boxMail-container { height: min(420px, 75vh); }
      .card2 h2 { font-size: 13px; }
    }
  </style>
</head>
<body>
<div id="particles"></div>

<div id="wrapper">

  <!-- FLAG BANNER — ใส่รูปธง/banner ของคุณที่ images/1.png หรือปรับ emoji นี้แทน -->
  <div class="flag__birthday">
    <div style="font-size:clamp(80px,15vw,180px); transform:rotate(-10deg) translate(-10px,20px); line-height:1;">🎉</div>
    <div style="font-size:clamp(80px,15vw,180px); transform:rotate(10deg) translate(10px,20px) scaleX(-1); line-height:1;">🎉</div>
  </div>

  <div class="content">

    <!-- LEFT -->
    <div class="left">
      <div class="title">
        <h1 class="happy">
          <span style="--t:4s">H</span><span style="--t:4.2s">a</span><span style="--t:4.4s">p</span><span style="--t:4.6s">p</span><span style="--t:4.8s">y</span>
        </h1>
        <h1 class="birthday">
          <span style="--t:5s">B</span><span style="--t:5.2s">i</span><span style="--t:5.4s">r</span><span style="--t:5.6s">t</span><span style="--t:5.8s">h</span><span style="--t:6s">d</span><span style="--t:6.2s">a</span><span style="--t:6.4s">y</span>
        </h1>
        <div class="hat">
          <!-- ใส่รูปหมวก: <img src="images/hat.png" width="130"> -->
          <div style="font-size:clamp(60px,9vw,110px); line-height:1;">🎩</div>
        </div>
      </div>

      <div class="date__of__birth"><span></span></div>

      <div class="btn">
        <button id="btn__letter">
          <div class="mail">
            Click here na krub
            <i class="fa-regular fa-envelope"></i>
          </div>
        </button>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="right">
      <div class="box__account">
        <div class="image">
          <!--
            วิธีใส่รูป:
            1. วางรูปไว้ใน folder เดียวกัน เช่น mudmee.jpg
            2. แทนที่ div placeholder ด้านล่างด้วย:
               <img src="mudmee.jpg" alt="P'Mudmee">
          -->
          <div class="placeholder-icon">🌸</div>
        </div>
        <div class="name">
          <i class="fa-solid fa-heart"></i>
          <span>P'Mudmee</span>
          <i class="fa-solid fa-heart"></i>
        </div>
        <div class="balloon_one">
          <div style="font-size:clamp(50px,8vw,90px); line-height:1;">🎈</div>
        </div>
        <div class="balloon_two">
          <div style="font-size:clamp(50px,8vw,90px); line-height:1;">🎀</div>
        </div>
      </div>

      <div class="cricle">
        <div class="text__cricle">
          <span style="--i:1">h</span><span style="--i:2">a</span><span style="--i:3">p</span>
          <span style="--i:4">p</span><span style="--i:5">y</span><span style="--i:6">-</span>
          <span style="--i:7">b</span><span style="--i:8">i</span><span style="--i:9">r</span>
          <span style="--i:10">t</span><span style="--i:11">h</span><span style="--i:12">d</span>
          <span style="--i:13">a</span><span style="--i:14">y</span><span style="--i:15">-</span>
        </div>
        <i class="fa-solid fa-heart"></i>
      </div>
    </div>
  </div>

  <!-- STAR DECORATIONS -->
  <div class="decorate_star star1" style="--t:15s"></div>
  <div class="decorate_star star2" style="--t:15.2s"></div>
  <div class="decorate_star star3" style="--t:15.4s"></div>
  <div class="decorate_star star4" style="--t:15.6s"></div>
  <div class="decorate_star star5" style="--t:15.8s"></div>

  <!-- FLOWER DECORATIONS — ใส่รูปดอกไม้ที่ images/decorate_flower.png หรือใช้ emoji -->
  <div class="decorate_flower flower1" style="--t:15s"><div style="font-size:22px">🌸</div></div>
  <div class="decorate_flower flower2" style="--t:15.3s"><div style="font-size:22px">🌸</div></div>
  <div class="decorate_flower flower3" style="--t:15.6s"><div style="font-size:22px">🌸</div></div>



  <!-- MAIL POPUP -->
  <div class="boxMail">
    <i class="fa-solid fa-xmark"></i>
    <div class="boxMail-container">
      <div class="card1">
        <div class="userImg">
          <!--
            ใส่รูปพี่มัดหมี่ตรงนี้:
            <img src="mudmee.jpg" alt="P'Mudmee">
          -->
          <div class="ph-icon">🌸</div>
        </div>
        <h4 class="username">To: P'Mudmee </h4>
        <h3>Happy Birthday</h3>
      </div>
      <div class="card2">
        <div class="card2-content">
          <h3>To you!</h3>
          <h2>
            ขอให้พี่มัดหมี่มีความสุขมากๆ นะครับ 🌸
            ขอให้ยิ้มเยอะๆ ไม่มีปัญหาอะไรในมหาลัย
            เรียนด้วยความสุขครับ 
            แฮปปี้เยอะๆๆๆ 
            กินข้าวให้ครบ 5 หมู่ จะได้ตัวโตๆ 
            ขอให้สุขภาพร่างกายแข็งแรงครับ 
          </h2>
        </div>
      </div>
    </div>
  </div>

</div><!-- #wrapper -->

<script>
  /* ── PARTICLES ── */
  (function() {
    const colors = ['#f48fb1','#e91e8c','#f8bbd0','#ff80ab','#ff4081','#fce4ec','#ffb3c6'];
    for (let i = 0; i < 20; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const s = Math.random() * 10 + 5;
      p.style.cssText = `width:${s}px;height:${s}px;background:${colors[i%colors.length]};left:${Math.random()*100}%;bottom:-${s}px;animation-duration:${(Math.random()*7+6).toFixed(1)}s;animation-delay:${(Math.random()*6).toFixed(1)}s;opacity:${(Math.random()*.5+.3).toFixed(2)}`;
      document.body.appendChild(p);
    }
  })();

  /* ── DATE TYPEWRITER ── */
  const dateTxt   = "24 May";
  const letterTxt = "ขอให้พี่มัดหมี่มีความสุขมากๆ นะครับ ขอให้ยิ้มเยอะๆ ไม่มีปัญหาอะไรในมหาลัย เรียนด้วยความสุขครับ แฮปปี้เยอะๆๆๆ กินข้าวให้ครบ 5 หมู่ จะได้ตัวโตๆ ขอให้สุขภาพร่างกายแข็งแรงครับ 💪";

  let idxDate = 0;
  const dateEl = document.querySelector('.date__of__birth span');
  setTimeout(() => {
    const t = setInterval(() => {
      if (idxDate < dateTxt.length) {
        dateEl.textContent += dateTxt[idxDate++];
      } else {
        const star = (cls) => { const i = document.createElement('i'); i.className = cls; return i; };
        document.querySelector('.date__of__birth').prepend(star('fa-solid fa-star'));
        document.querySelector('.date__of__birth').append(star('fa-solid fa-star'));
        clearInterval(t);
      }
    }, 100);
  }, 12000);

  /* ── MAIL POPUP ── */
  const mailBox   = document.querySelector('.mail');
  const boxMailEl = document.querySelector('.boxMail');
  const closeBtn  = document.querySelector('.fa-xmark');

  mailBox.addEventListener('click', () => {
    mailBox.classList.toggle('active');
    boxMailEl.classList.add('active');
  });
  closeBtn.addEventListener('click', () => {
    boxMailEl.classList.remove('active');
  });
  boxMailEl.addEventListener('click', (e) => {
    if (e.target === boxMailEl) boxMailEl.classList.remove('active');
  });
</script>
</body>
</html>
